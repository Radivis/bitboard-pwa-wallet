feature:
  name: Arkade
  description: "Educational Arkade (VTXO) layer with Bitboard-hosted Fulmine delegator"
  user_stories:
    - As a user, I want to enable Arkade under Settings → Features so I can use an offchain Bitcoin layer without a Lightning wallet
    - As a user, I want my Arkade wallet to use the correct operator and delegator for the network I selected (mainnet, testnet, signet/Mutinynet)
    - As a user, I want to see my Arkade balance separately from my on-chain balance
    - As a user, I want to receive funds on an Arkade address (ark1/tark1) with a QR code
    - As a user, I want to send Arkade payments to an Arkade address
    - As a user, I want to view Arkade payment history
    - As a user, I want to board Bitcoin from my on-chain wallet into Arkade
    - As a user, I want VTXO renewal delegated to Bitboard's Fulmine service so I do not need the app open 24/7
    - As a user, I want to understand VTXO expiry and optionally renew manually for learning
    - As a user, I want to exit Arkade to an on-chain address collaboratively when the operator is available
    - As a user, I want to exit a specific VTXO unilaterally without operator cooperation when needed
    - As a user, I want the app to keep working when the Arkade operator rotates its signing key, with clear guidance on migrating or exiting funds
    - As a user, I want to view individual VTXOs and their state (classification, flags, expiry) in a compact inventory
  requirements:
    - Arkade is gated by isArkadeEnabled (default off) and isMainnetAccessEnabled for mainnet
    - Arkade is available on mainnet, signet, and regtest (local arkd via arkade-regtest for dev/E2E); not on lab in v1
    - delegatorProvider must be configured at first Wallet.create per (wallet_id, networkMode)
    - Mnemonic decryption runs only in workers (secrets channel); never on the main thread
    - Default delegator and operator URLs come from arkade-endpoints.ts (env overrides supported)
    - Network switch terminates and reopens the Arkade worker session for the new network
    - Lock wallet terminates arkade.worker and clears session state
    - BitboardArkPersistence (engine ark-rs, wire version 3) in sdkPersistenceJson per operator connection inside encrypted wallet_secrets
    - Offchain receive derivation cursor is a single scalar in walletDb (see docs/arkade-bitboard-wallet-model.md); no index arrays in sdkPersistenceJson
    - Wallet reopen hydrates boarding outputs from sdkPersistenceJson; operator required for live balance sync and sends
  contracts:
    receive_address:
      - id: ARK-RCV-01
        description: Receive shows the last revealed offchain receive index until the user generates a new one
      - id: ARK-RCV-02
        description: Re-opening Receive, lock/unlock, or reload does not change the displayed address
      - id: ARK-RCV-03
        description: Incoming payments to the displayed index still appear in balance/history after operator sync
      - id: ARK-RCV-04
        description: Generate new address reveals the next index and persists offchain_next_derivation_index
      - id: ARK-RCV-05
        description: Read paths (getAddress, balance, history) never await wallet-secrets re-encrypt
    signer_rotation:
      - id: ARK-ROT-01
        description: Session open succeeds when stored operator_identity.signer_pk_hex equals current getInfo signer
      - id: ARK-ROT-02
        description: Session open succeeds when stored signer matches a deprecatedSigners pubkey for the same operator URL, including after cooperative cutoff
      - id: ARK-ROT-03
        description: After cooperative migration completes (no pre-cutoff deprecated VTXO/boarding remaining), persistence export writes current signer into operator_identity and connection operatorSignerPkHex
      - id: ARK-ROT-04
        description: Signer mismatch with neither current nor deprecated keys yields load-error with operator-change vs wrong-ASP messaging
      - id: ARK-ROT-05
        description: Signer migration surfaces a non-blocking banner on Dashboard and Management Arkade with regime-appropriate actions (migrate, sync, unilateral exit)
      - id: ARK-ROT-06
        description: migrate_deprecated_signer_vtxos aborts without stamping persistence when discover_keys fails
      - id: ARK-ROT-07
        description: Partial migration (deferred batches) keeps migration banner and deprecated signer in persistence until cooperatively complete
      - id: ARK-ROT-08
        description: Migrate loops internally until clean or pass cap; UI prompts Migrate again when incomplete
      - id: ARK-ROT-09
        description: NothingMigratable with remaining pre-cutoff funds returns error, not success
    recoverable_vtxo_recovery:
      - id: ARK-REC-01
        description: When recoverableSettleableVtxoCount is greater than zero after balance sync, Dashboard and Management show a recoverable VTXO banner with count and settleable sats
      - id: ARK-REC-02
        description: Banner is hidden when recoverableSettleableVtxoCount is zero
      - id: ARK-REC-03
        description: Recover now triggers batch settle of settleable recoverable VTXOs only (settle_vtxos with empty boarding) and refreshes balance
      - id: ARK-REC-04
        description: Fee estimate failure still shows banner and enables Recover now; operator fee and net receive shown when estimate succeeds
      - id: ARK-REC-05
        description: When recoverablePendingOperatorSweepVtxoCount is greater than zero, balance breakdown shows expired waiting for operator sweep line without Recover now
      - id: ARK-REC-06
        description: When pendingRecoveryDueToExpiredSignerSats is greater than zero, Dashboard and Management show a pending-recovery-due-to-expired-signer banner linking to Start unilateral exit in Management
      - id: ARK-REC-07
        description: VTXOs in unilateral exit do not contribute to pendingRecoveryDueToExpiredSignerSats even when they would otherwise qualify for pending recovery due to expired signer
      - id: ARK-REC-08
        description: Pre-unroll pending unilateral outpoints do not contribute to recoverableSettleableVtxoCount, recoverablePendingOperatorSweepVtxoCount, expiring-soon count, or earliest-expiry indicator; post-unroll exiting VTXOs are excluded by vendored ark-core bucketing
    unilateral_exit:
      - id: ARK-EXIT-01
        description: Start unilateral exit lists only VTXOs that can start unroll; in-progress and ready-to-complete VTXOs are excluded
      - id: ARK-EXIT-02
        description: Complete unilateral exit lists in-progress VTXOs from local snapshot and pending deductions when operator indexing lags
      - id: ARK-EXIT-03
        description: Complete unilateral exit supports multi-select batch completion with explicit virtual outpoints (txid + vout) and fee estimate scaled to selected inputs
      - id: ARK-EXIT-04
        description: Completion fee estimate includes missingBlocktimeInputs (virtual outpoint and on-chain outpoint per affected VTXO) when Esplora omits confirmation blocktime; UI shows a non-blocking list in Complete unilateral exit. Permissive completion coin-select (Duration::ZERO fallback) is intentional for regtest/thin Esplora in CI and local debugging; uncommon on production Esplora.
      - id: ARK-EXIT-05
        description: When complete exit times out waiting for operator indexer after unroll, UI shows a non-destructive indexer-catching-up state instead of a generic failure
      - id: ARK-EXIT-06
        description: Autonomous mode unilateral exit never calls ASP indexer or batch APIs for list, chain, virtual tx, or completion coin-select
      - id: ARK-EXIT-07
        description: Operator sync prefetches unilateral_exit_materials on exit-eligible VTXO snapshot records and persists cached_operator_info
      - id: ARK-EXIT-08
        description: Autonomous start unroll fails fast with autonomous_exit_materials_missing when selected VTXO lacks prefetched materials
      - id: ARK-EXIT-09
        description: Autonomous complete uses snapshot readiness plus Esplora only; no operator indexer poll or OperatorIndexerCatchingUp path; autonomous unroll polls Esplora for branch visibility before setting local is_unrolled and returns unilateral_unroll_not_confirmed_on_chain when chain missing after the poll window
      - id: ARK-EXIT-10
        description: While autonomous mode is active, collaborative exit, send, renew, recoverable settlement, signer migration, boarding settle, and manual operator sync are blocked in UI and WASM
      - id: ARK-EXIT-11
        description: After unilateral unroll broadcasts, WASM polls operator list_vtxos until is_unrolled and not is_spent (up to 60s); success with indexerWarning when on-chain confirmed but ASP lags; hard error when neither ASP nor chain confirms; sticky is_unrolled merge during poll sync for in-list operator rows
      - id: ARK-EXIT-12
        description: Explicit unilateral_exit_watches registry in wallet persistence; survives full snapshot replace; cleared only on completion, hard unroll failure, or reconcile evidence (operator spent or on-chain spent)
    operator_sync:
      - id: ARK-SYNC-01
        description: When discover_keys fails during operator sync but list_vtxos succeeds, sync lifecycle records a warningMessage and dashboard/management show a non-blocking sync warning banner
      - id: ARK-SYNC-02
        description: A later successful sync without key-discovery failure clears warningMessage
      - id: ARK-SYNC-03
        description: After operator sync, reconcile_exiting_vtxo_watches runs targeted lookups for watched exiting VTXOs; non-blocking exitingVtxoWarning when indexer lag or ASP mismatch; never clear exiting state on full-list absence alone
    operator_trust:
      - id: ARK-TRUST-01
        description: When operator digest differs from accepted cached_operator_info, sync does not persist offchain snapshot, exit watches, materials prefetch, or accepted operator cache
      - id: ARK-TRUST-02
        description: Pending getInfo is persisted as pending_operator_info for offline diff review while operator_trust_pending
      - id: ARK-TRUST-03
        description: Blocking modal with exactly two choices; Review changes safely in autonomous mode is default focus
      - id: ARK-TRUST-04
        description: While operator_trust_pending, exit_autonomous_mode is blocked until accept_pending_operator_config
      - id: ARK-TRUST-05
        description: accept_pending_operator_config refreshes live getInfo, promotes pending only when pending.digest matches live digest, otherwise re-stages pending and keeps operator_trust_pending for modal review
      - id: ARK-TRUST-06
        description: Session open preserves accepted cached_operator_info while operator_trust_pending (no live getInfo overwrite)
    vtxo_viewer:
      - id: ARK-VTX-01
        description: VTXO viewer page lists VTXO cards when session open and Arkade active
      - id: ARK-VTX-02
        description: Each card shows id, amount, classification, true-only flag chips (including unilateral exit prepared with door-open icon when cached exit materials exist), created and expiry timestamps
      - id: ARK-ARK-MGMT-01
        description: Arkade management panel shows next operator batch window when getInfo scheduledSession is available, or an explicit not-published message when it is null
      - id: ARK-VTX-03
        description: Hide finalized defaults on; toggle shows finalized cards
      - id: ARK-VTX-04
        description: Search filters by partial id or sats amount
      - id: ARK-VTX-05
        description: Classification chips filter grid; counts reflect full list
      - id: ARK-VTX-06
        description: Pagination at 20 cards when filtered count exceeds page size
      - id: ARK-VTX-07
        description: Management panel links to VTXO viewer
  pages:
    - ArkadeManagement:
      - description: "Arkade status on Management page"
      - file: frontend/src/components/wallet/ArkadePanel.tsx
      - visible_elements:
        - Arkade balance (confirmed/total when available)
        - Arkade receive address with copy
        - delegator fee from getDelegateInfo when reachable
        - expiring VTXO count when session open
        - operator batch round schedule when operator publishes scheduledSession
        - collaborative exit (on-chain destination, optional partial amount) with operator fee estimate from getInfo().fees
        - Start unilateral exit (select VTXO, unroll) with bumper fee estimate; separate Complete unilateral exit for in-progress VTXOs after timelock
        - batch complete multiple ready in-progress VTXOs in one on-chain transaction with dynamic completion fee estimate
        - pending_recovery_due_to_expired_signer_sats excludes VTXOs already in unilateral exit (no double-count with unilateral_exit_in_progress_sats)
        - signer migration banner when operator signing key rotated (migratable, due now, or expired regimes)
        - pending recovery banner when funds are locked past cooperative migration cutoff
        - recoverable VTXO banner when operator reports swept/expired/sub-dust VTXOs with Recover now action
        - View VTXOs link to /wallet/arkade/vtxos
      - requirements:
        - Shown only when isArkadeEnabled and current network supports Arkade
        - Collaborative exit and fee estimates via bitboard-ark WASM in arkade.worker
        - Unilateral exit via ark-rs unroll APIs; bumper balance and fee estimates from worker
    - WalletReceiveArkadeMode:
      - description: "Arkade receive integrated in main Receive page"
      - file: frontend/src/pages/wallet/ReceivePage.tsx
      - path: /wallet/receive
      - visible_elements:
        - Receive mode toggle includes Arkade when isArkadeEnabled and network supported
        - Arkade address QR and copy (not on-chain bc1)
        - Generate new address control (mirrors on-chain Receive)
      - requirements:
        - Contracts ARK-RCV-01 through ARK-RCV-05 apply to Arkade receive mode
    - WalletSendArkadeDetection:
      - description: "Arkade send via address format on main Send page"
      - file: frontend/src/pages/wallet/SendPage/index.tsx
      - path: /wallet/send
      - visible_elements:
        - Recipient field accepts ark1/tark1 when Arkade active
        - Arkade balance shown; on-chain fee section hidden for Arkade sends
      - requirements:
        - Lightning detection takes priority over Arkade; Arkade over on-chain
    - ArkadeBoard:
      - path: /wallet/arkade/board
      - file: frontend/src/routes/wallet/arkade/board.tsx
      - visible_elements:
        - boarding address from SDK
        - amount to send from on-chain wallet
        - steps for confirm on-chain then onboard via Ramps
    - ArkadeVtxoViewer:
      - path: /wallet/arkade/vtxos
      - file: frontend/src/routes/wallet/arkade/vtxos.tsx
      - visible_elements:
        - VTXO card grid (id, amount, classification, flag chips, created/expiry)
        - search by id or sats amount
        - classification filter chips with counts
        - sort by amount, expiry, or created
        - hide finalized toggle (default on)
        - pagination at 20 cards per page
        - fromSnapshotSyncedAt subtitle when list served from local snapshot
      - requirements:
        - Contracts ARK-VTX-01 through ARK-VTX-07
        - Shown only when isArkadeEnabled and current network supports Arkade
    - DashboardArkadeBlock:
      - description: "Separate Arkade balance on dashboard"
      - file: frontend/src/components/wallet/ArkadeDashboardBalance.tsx
      - contract_spec: doc/features/dashboard-arkade-contract.yaml
      - visible_elements:
        - Arkade balance label
        - confirmed and optional pending balance display
