[dependencies.bitcoin]
version = "0.32"
features = [
    "serde",
    "std",
]
default-features = false

[dependencies.hex]
version = "0.2"
package = "hex-conservative"

[dependencies.log]
version = "^0.4"

[dependencies.minreq]
version = "2.11.0"
