    "Bitcoin Dev Kit Developers",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Bitcoin Esplora API client library. Supports plaintext, TLS and Onion servers. Blocking or async"
homepage = "https://github.com/bitcoindevkit/rust-esplora-client"
documentation = "https://docs.rs/esplora-client/"
readme = "README.md"
keywords = [
    "bitcoin",
    "esplora",
]
license = "MIT"
repository = "https://github.com/bitcoindevkit/rust-esplora-client"

[features]
async = [
    "reqwest",
    "reqwest/socks",
    "tokio?/time",
]
async-https = [
    "async",
    "reqwest/default-tls",
]
async-https-native = [
    "async",
    "reqwest/native-tls",
]
async-https-rustls = [
    "async",
    "reqwest/rustls-tls",
]
async-https-rustls-manual-roots = [
    "async",
    "reqwest/rustls-tls-manual-roots",
]
blocking = [
    "minreq",
    "minreq/proxy",
]
blocking-https = [
    "blocking",
    "minreq/https",
]
