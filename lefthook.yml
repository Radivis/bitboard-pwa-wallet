output:
  - execution  # Verbose output
  - failure    # Always shows errors (default, but explicit is good)

pre-commit:
  parallel: false
  commands:
    fmt:
      run: cargo fmt
      stage_fixed: true
    clippy:
      run: cargo clippy --workspace --all-targets
    test-compile:
      run: cargo test --workspace --no-run

post-commit:
  commands:
    e2e-reminder:
      run: ./scripts/e2e-reminder.sh
      # Reminds developers to run E2E tests manually
      priority: 1
    coverage-reminder:
      run: ./scripts/coverage-reminder.sh
      # Reminds developers to run coverage refresh manually (./scripts/refresh-coverage.sh)
      priority: 2
