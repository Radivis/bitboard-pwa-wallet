# Production deploy: build on GitHub Actions (Rust + wasm-pack + Vite), host on Vercel via prebuilt output.
# One-time Vercel + GitHub secrets: docs/deploy-vercel.md
name: Deploy to Vercel (production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy prebuilt
    runs-on: ubuntu-latest
    # Pull/build: `vercel … --cwd frontend` from repo root + strip `settings.rootDirectory` in
    # `.vercel/project.json` (avoids install cwd bugs — vercel/community#2793).
    # Deploy: `vercel deploy --prebuilt` still validates a filesystem path derived from Root
    # Directory; monorepo `frontend` can resolve to …/frontend/frontend. We mkdir that path empty
    # so the check passes (see docs/deploy-vercel.md).

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # Never use fast Argon2id in production; override repo/org Actions vars if mis-set
      VITE_ARGON2_CI: ''

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Load BITBOARD_SITE_ORIGIN into VITE_SITE_ORIGIN for Vite (Open Graph)
        run: |
          value="$(gh api "repos/${{ github.repository }}/actions/variables/BITBOARD_SITE_ORIGIN" --jq .value 2>/dev/null || true)"
          if [ -n "$value" ]; then
            echo "VITE_SITE_ORIGIN=$value" >> "$GITHUB_ENV"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Rust toolchain (wasm32)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      # `vercel build` runs the project Build Command (`npm run build`), which includes
      # `build:wasm` + `tsc` + `vite build`. Rust + wasm-pack must be on PATH first.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@51.8.0

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd frontend

      - name: Strip rootDirectory from pulled project settings
        uses: ./.github/actions/strip-vercel-project-root-directory
        with:
          project-json-path: frontend/.vercel/project.json

      - name: Vercel build (prebuilt output)
        run: vercel build --token="$VERCEL_TOKEN" --prod --cwd frontend

      # `vercel build` may refresh `.vercel/project.json`; deploy still merges Root Directory and can
      # require …/frontend/frontend to exist for --prebuilt (CLI regression / strict check).
      - name: Strip rootDirectory after build (before prebuilt deploy)
        uses: ./.github/actions/strip-vercel-project-root-directory
        with:
          project-json-path: frontend/.vercel/project.json

      - name: Prepare prebuilt deploy (satisfy path check)
        run: mkdir -p frontend/frontend

      - name: Deploy prebuilt to production
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
